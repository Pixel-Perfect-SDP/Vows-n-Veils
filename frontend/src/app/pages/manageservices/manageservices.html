<main>
    <div class="button-container">
        <div class="toggle-switch">
            <button (click)="select('Venues')"
                [ngClass]="selected === 'Venues' ? 'yes-style' : 'default-style'">Venues</button>
            <button (click)="select('Vendors')"
                [ngClass]="selected === 'Vendors' ? 'no-style' : 'default-style'">Vendors</button>
        </div>

    </div>
    <div class="addbtn" *ngIf="selected === 'Venues' && !addingVenue && !editingVenue">
        <button class="add-venue-btn" (click)="AddVenue()">Add Venue</button>
    </div>
    <div class="content" *ngIf="selected === 'Venues'; else noVenues">

        <!-- Add Venue Form -->
        <div *ngIf="addingVenue" class="update-form">
            <h2>Add New Venue</h2>

            <label>Venue Name</label>
            <input type="text" [(ngModel)]="newVenueData.venuename" placeholder="Add new venue name" />

            <label>Description</label>
            <input type="text" [(ngModel)]="newVenueData.description" placeholder="Add new description" />

            <label>Address</label>
            <input type="text" [(ngModel)]="newVenueData.address" placeholder="Add new address" />

            <label>Email</label>
            <input type="email" [(ngModel)]="newVenueData.email" placeholder="Add new email" />

            <label>Phone Number</label>
            <input type="text" [(ngModel)]="newVenueData.phonenumber" placeholder="Add new phone number" />

            <label>Capacity</label>
            <input type="number" [(ngModel)]="newVenueData.capacity" placeholder="Add new capacity" />

            <label>Price</label>
            <input type="number" [(ngModel)]="newVenueData.price" placeholder="Add new price" />

            <label>Image Placeholder</label>
            <input type="text" disabled value="placeholder-image.jpg" />

            <div class="form-buttons">
                <button (click)="SubmitNewVenue()">Add Venue</button>
                <button (click)="CancelAdd()">Cancel</button>
            </div>
        </div>

        <!-- Venue Cards -->
        <div *ngIf="!addingVenue && !editingVenue" class="venue-list">
            <div class="card" *ngFor="let venue of venues">
                <h3>{{ venue.venuename }}</h3>
                <img *ngIf="venue.images && venue.images[1]" [src]="venue.images[1]" alt="{{venue.venuename}}" />
                <button class="btn" (click)="UpdateVenue(venue)">Update Venue Details</button>
                  <button class="btn delete-btn" (click)="DeleteVenue(venue)">Delete Venue</button>

            </div>
        </div>

        <!-- Update Form -->
        <div *ngIf="editingVenue" class="update-form">
            <h2>Update Venue: {{ editingVenue.venuename }}</h2>

            <label>Venue Name</label>
            <input type="text" [(ngModel)]="updateData.venuename" placeholder="Add new venue name" />

            <label>Description</label>
            <input type="text" [(ngModel)]="updateData.description" placeholder="Add new description" />

            <label>Address</label>
            <input type="text" [(ngModel)]="updateData.address" placeholder="Add new address" />

            <label>Email</label>
            <input type="email" [(ngModel)]="updateData.email" placeholder="Add new email" />

            <label>Phone Number</label>
            <input type="text" [(ngModel)]="updateData.phonenumber" placeholder="Add new phone number" />

            <label>Capacity</label>
            <input type="number" [(ngModel)]="updateData.capacity" placeholder="Add new capacity" />

            <label>Price</label>
            <input type="number" [(ngModel)]="updateData.price" placeholder="Add new price" />

            <div class="form-buttons">
                <button (click)="SubmitUpdate()">Update</button>
                <button (click)="CancelUpdate()">Cancel</button>
            </div>
        </div>

    </div>

    <ng-template #noVenues>
        <p>NEED TO PUT VENDOR INFOMATIONS</p>
    </ng-template>
</main>
